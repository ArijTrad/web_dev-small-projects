<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨my to do list✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="todoapp">
            <h1>To-Do List</h1>
            <form action="" class="inputarea">
                <input type="text" name="" id="task-input" placeholder="Add a new task... 📝">
                <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i> </button>
                <div class="todos-container">
                    <ul id="task-list"></ul>
                    <img class="empty-image" src="empty.png" alt="empty to do list">

                    
                </div>
                

            </form>


        </div>
    </div>

    

</body>
</html>
